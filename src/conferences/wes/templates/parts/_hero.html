<div class="hero">
	<video preload="auto" muted autoplay loop playsinline poster="img/hero_poster.jpg" class="hero__video">
		<source src="video/hero.mp4?v1" type="video/mp4" />
	</video>
	<div class="container hero__inner">
		<div class="hero__head">
			<div class="hero__date">{{pagesPieceOfTexts.hero__date | safe}} </div>
			<h1 class="hero__title {{ 'hero__title--main' if pages[pageKey] == pages.main }}">{{pagesPieceOfTexts.hero__title | safe}}</h1>
			<div class="hero__info">
				{% if pages[pageKey].pageStatistics.eventStats %}
				{{mixins.eventStats(pages[pageKey].pageStatistics.eventStats)}}
				{% endif %}

				<div class="hero__partnership">
					<a href="https://sentry.io/welcome/" target="_blank" class="hero__partnership-img" onclick={{ ga_mixins.sendGAEvent({ values: 'hero-partnership-click;' , category: 'hero-partnership-click' , isAuth: false }) }}>
						<img src="img/logo_sentry.png" srcset="img/logo_sentry@2x.png 2x" alt="Sentry Logo">
					</a>
				</div>
			</div>

		</div>
	</div>
	{% if not hideHeroCtas %}
	<div class="hero__bottom">
		<div class="container">
			{% include "partials/_hero-buttons.html" %}
		</div>
	</div>
	{% endif %}

	<!-- <div class="hero__bg " style="background-image: url('img/hero-bg.svg');"></div> -->
</div>
