<section class="section s-techs" id="techs">
	<div class="container">
		{% if techData.title %}
		<h2 class="section__title">{{ techData.title | safe }}</h2>
		{% endif %}

		{{ mixins.techsV2(techData.blocks, mixins) }}

		{% if techData.description %}
		<div class="s-techs__follow-us">
			{{ techData.description | safe }}
		</div>
		{% endif %}
	</div>
</section>
