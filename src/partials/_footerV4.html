<footer class="footer " role="contentinfo" id="footer">
  <div class="container">
    <div class="footer__bg"></div>
    <div class="footer-blocks">
      <div class="footer-block">
        <h2 class="section__title"> Follow us </h2>
        <div class="footer__socials">
          {{mixins.socialsConf(conference)}}
        </div>
        <div class="footer__logo">
          <div class="f-logo">
            <span class="f-logo__icon">
              <img src="img/logo_footer.svg" alt="Frontend nation">
            </span>
            <div class="f-logo__label">
              Event by
              <a href="https://gitnation.org">GitNation</a>
            </div>
          </div>
        </div>
      </div>
      <div class="footer-block footer-block--right">
        <div class="footer-block__subscribe">
          <form action="{{ pagesPieceOfTexts.contactForm__formAction | safe }}" method="GET" class="f-form" target="_blank">
            <div class="f-form__title">{{pagesPieceOfTexts.footer__formTitle }}</div>
            <div class="f-form__wrap">
              <div class="f-form__field">
                <input type="email" value="" name="email" class="form-input f-form__input "
                  placeholder="Email address" required="">
              </div>
              <button type="submit" aria-label="Subscribe" class="f-form__btn btn">Subscribe</button>
            </div>
          </form>
        </div>
        <div class="footer-block__bot">
          <div class="footer__nav">
            <ul class="f-nav">
              {% for item in pages[pageKey].pageNavigation.footerNav %}
              <li class="f-nav__item"><a href="{{item.href}}" class="f-nav__link" {% if item.openInNewTab %} target="_blank" {% endif %}>{{item.text}}</a></li>
              {% endfor %}
            </ul>
          </div>
          <div class="footer__tip">{{ mixins.text(pieceOfTexts, 'footer__tip') }}</div>
          <div class="footer__logo footer__logo--mob">
            <div class="f-logo">
              <span class="f-logo__icon">
                <img src="img/logo_footer.svg" alt="Frontend nation">
              </span>
              <div class="f-logo__label">
                Event by
                <a href="https://gitnation.org">GitNation</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</footer>
